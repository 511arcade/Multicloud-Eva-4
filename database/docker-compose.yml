services:
  postgres:
    image: postgres:16-alpine
    container_name: cruz_azul_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cruz_azul_erp}
      POSTGRES_USER: ${POSTGRES_USER:-erp_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_admin_pass}
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp_admin} -d ${POSTGRES_DB:-cruz_azul_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5
